{% extends 'base.html' %}

{% block title %}Branch Preferences - College Counselling Portal{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto p-8 bg-white shadow rounded-lg">
    <h2 class="text-2xl font-semibold mb-6">Enter Your Marks and Branch Preferences</h2>

    <form method="POST">
        {% csrf_token %}
        
        <!-- High School Marks -->
        <h3 class="text-xl font-semibold mb-2">High School Marks (out of 100)</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <input type="number" name="math_hs" placeholder="Maths" class="border p-2 rounded w-full" min="0" max="100" required>
            <input type="number" name="science_hs" placeholder="Science" class="border p-2 rounded w-full" min="0" max="100" required>
            <input type="number" name="english_hs" placeholder="English" class="border p-2 rounded w-full" min="0" max="100" required>
            <input type="number" name="hindi_hs" placeholder="Hindi" class="border p-2 rounded w-full" min="0" max="100" required>
        </div>

        <!-- 10+2 Marks -->
        <h3 class="text-xl font-semibold mb-2">10+2 Marks (out of 100)</h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <input type="number" name="physics" placeholder="Physics" class="border p-2 rounded w-full" min="0" max="100" required>
            <input type="number" name="chemistry" placeholder="Chemistry" class="border p-2 rounded w-full" min="0" max="100" required>
            <input type="number" name="math_12" placeholder="Maths" class="border p-2 rounded w-full" min="0" max="100" required>
        </div>

        <!-- Branch Choices -->
        <h3 class="text-xl font-semibold mb-2">Branch Preferences</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <select name="branch_choice_1" class="border p-2 rounded w-full" required>
                <option value="" disabled selected>First Preference</option>
                <option value="CSE">Computer Science Engineering</option>
                <option value="ECE">Electronics & Communication Engineering</option>
                <option value="ME">Mechanical Engineering</option>
                <option value="CE">Civil Engineering</option>
                <option value="EE">Electrical Engineering</option>
                <option value="IT">Information Technology</option>
            </select>

            <select name="branch_choice_2" class="border p-2 rounded w-full" required>
                <option value="" disabled selected>Second Preference</option>
                <option value="CSE">Computer Science Engineering</option>
                <option value="ECE">Electronics & Communication Engineering</option>
                <option value="ME">Mechanical Engineering</option>
                <option value="CE">Civil Engineering</option>
                <option value="EE">Electrical Engineering</option>
                <option value="IT">Information Technology</option>
            </select>
        </div>

        <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded font-semibold hover:bg-green-700">
            Save Preferences
        </button>
    </form>
</div>
{% endblock %}
