{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow-md mt-10">
  <h2 class="text-2xl font-semibold mb-6">Fee Payment</h2>
  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <label class="block mb-2 font-medium">Upload Payment Receipt</label>
    <input type="file" name="receipt" class="border p-2 rounded w-full">
    <button type="submit" class="mt-4 bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700">Submit</button>
  </form>
</div>
{% endblock %}
