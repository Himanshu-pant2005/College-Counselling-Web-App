{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto p-6 bg-white rounded shadow">
  <h2 class="text-2xl font-bold mb-4">Create Your Profile</h2>
  
  <form method="post">
    {% csrf_token %}
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      {{ form.first_name.errors }}
      <input type="text" name="first_name" value="{{ form.first_name.value|default:'' }}" placeholder="First Name" class="border p-2 rounded w-full">

      {{ form.last_name.errors }}
      <input type="text" name="last_name" value="{{ form.last_name.value|default:'' }}" placeholder="Last Name" class="border p-2 rounded w-full">

      {{ form.email.errors }}
      <input type="email" name="email" value="{{ form.email.value|default:'' }}" placeholder="Email" class="border p-2 rounded w-full">

      {{ form.phone.errors }}
      <input type="text" name="phone" value="{{ form.phone.value|default:'' }}" placeholder="Phone Number" class="border p-2 rounded w-full">

      {{ form.dob.errors }}
      <input type="date" name="dob" value="{{ form.dob.value|default:'' }}" class="border p-2 rounded w-full">
    </div>

    <button type="submit" class="mt-6 px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
      Save & Continue
    </button>
  </form>
</div>
{% endblock %}
